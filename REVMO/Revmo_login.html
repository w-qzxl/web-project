<!doctype html>
<html>

<head>
    <title>REVMO</title>
    <meta charset="utf-8" />
    <meta name="keywords"
        content="movies, series, reviews, ratings, films, cinema, revmo, film review, watchlist, top movies" />
    <meta name="description"
        content="Revmo is a movie and TV show rating platform where users can discover, review, and rate films and series." />
    <link type="text/css" rel="stylesheet" href="style_login.css" />
</head>

<body>
    <header class="main-header">
        <div>
            <a href="Revmo_login.html"><span class="black">REV</span>MO</a>
        </div>
    </header>

    <div class="login-form">
        <form method="get" action="Revmo_home.html">
            <div>
                <input type="email" name="email" maxlength="20" required autofocus autocomplete="email"
                    placeholder="Enter email" />
            </div>
            <div>
                <input type="password" name="password" maxlength="20" required autocomplete="off"
                    placeholder="Enter password" />
            </div>
            <div>
                <input type="submit" value="Login" />
            </div>
            <div>
                <input type="reset" />
            </div>
        </form>
    </div>
</body>

</html>
